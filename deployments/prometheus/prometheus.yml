global:
  scrape_interval: 15s

rule_files:
  - "/etc/prometheus/alert.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: indexer
    static_configs:
      - targets: ["indexer:8081"]
    metrics_path: /metrics